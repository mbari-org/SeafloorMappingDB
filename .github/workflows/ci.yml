# Can test locally with: act -P macos-14=-self-hosted

name: CI

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]

  push:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]

jobs:
  ##linter:
  ##  runs-on: ubuntu-latest
  ##  steps:

  ##    - name: Checkout Code Repository
  ##      uses: actions/checkout@v2

  ##    - name: Set up Python 3.9
  ##      uses: actions/setup-python@v2
  ##      with:
  ##        python-version: 3.9

  # Run all pre-commit hooks on all the files.
  # Getting only staged files can be tricky in case a new PR is opened
  # since the action is run on a branch in detached head state
  ##    - name: Install and Run Pre-commit
  ##      uses: pre-commit/action@v2.0.0

  # With no caching at all the entire ci process takes 4m 30s to complete!
  # Run on ubuntu-latest: Docker is pre-installed there; macos-14 runners do not have Docker.
  pytest:
    runs-on: ubuntu-latest

    steps:
      # https://stackoverflow.com/a/65346817/1281657
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # GitHub ubuntu-latest has Docker Compose V2: use "docker compose" (space), not "docker-compose".
      # Run from smdb/ so compose context and paths resolve correctly.
      - name: Build the Stack
        working-directory: smdb
        run: docker compose -f ci.yml up -d --build

      - name: Run the Migrations
        working-directory: smdb
        run: docker compose -f ci.yml run --rm django python manage.py migrate

      - name: Run Pytest Tests
        working-directory: smdb
        run: docker compose -f ci.yml run --rm django pytest -s --cov-report term-missing --cov

      - name: Tear down the Stack
        if: always()
        working-directory: smdb
        run: docker compose -f ci.yml down
