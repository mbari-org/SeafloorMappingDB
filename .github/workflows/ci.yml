name: CI
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
on:
  pull_request:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]
  push:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
      # CI only needs backend services for migrate + pytest.
      # Avoid building node/selenium here to reduce flaky external network pulls (npm/registry).
      # Build django explicitly, then run commands in one-off django containers.
      - name: Build & Start required services
        working-directory: smdb
        run: |
          docker compose -f ci.yml up -d postgres mailhog
          docker compose -f ci.yml build django
      - name: Run the Migrations
        working-directory: smdb
        run: |
          # Pin amd64 GIS library paths for GitHub ubuntu runners.
          # Prevent accidental ARM path injection from inherited environment.
          docker compose -f ci.yml run --rm \
            -e GEOS_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgeos_c.so \
            -e GDAL_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgdal.so \
            django python manage.py migrate
      - name: Run Pytest Tests
        working-directory: smdb
        run: |
          docker compose -f ci.yml run --rm \
            -e GEOS_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgeos_c.so \
            -e GDAL_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgdal.so \
            django pytest -s --cov-report term-missing --cov
      - name: Tear down the Stack
        if: always()
        working-directory: smdb
        run: docker compose -f ci.yml down