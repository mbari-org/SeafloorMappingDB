volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_traefik: {}
  local_media_files: {}

# Host-specific path overrides — set these in smdb/.env (never commit that file).
# Defaults work on macOS with the standard developer layout.
# On smdb-dev (Linux) create smdb/.env containing:
#   SEAFLOOR_MAPPING_DIR=/mbari/SeafloorMapping
#   SSH_DIR=/home/docker_user/.ssh
#   SMDB_ETC_DIR=/Users/mccann/docker_smdb_vol/etc   # already exists on smdb-dev

services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      args:
        - DOCKER_USER_ID=$DOCKER_USER_ID
    image: smdb_production_django
    depends_on:
      - postgres
      - redis
    env_file:
      # In smdb/.envs/.production/.django add the following for Mac M1/M2 Arm:
      # GEOS_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/libgeos_c.so
      # GDAL_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/libgdal.so
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    command: /start
    restart: always
    volumes:
      - ${SSH_DIR:-/Users/mccann/.ssh}:/home/docker_user/.ssh:z
      - ${SEAFLOOR_MAPPING_DIR:-/Volumes/SeafloorMapping}:/mbari/SeafloorMapping:z
      - ${SMDB_ETC_DIR:-/Users/mccann/docker_smdb_vol/etc}:/etc/smdb:z
      - local_media_files:/media:z

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: smdb_production_postgres
    restart: always
    volumes:
      - production_postgres_data:/var/lib/postgresql/data:Z
      - production_postgres_data_backups:/backups:z
    env_file:
      - ./.envs/.production/.postgres

  redis:
    image: redis:5.0
    restart: always

  mb-system:
    profiles:
      - full
    build:
      # Build image that has user docker_user already added - needed before volume mount
      # Make sure DOCKER_USER_ID is set in the environment before build - see README.md
      context: .
      dockerfile: ./compose/production/mb-system/Dockerfile
      args:
        - DOCKER_USER_ID=$DOCKER_USER_ID
    image: mb-system
    container_name: mb-system
    restart: always
    volumes:
      - ${SSH_DIR:-/Users/mccann/.ssh}:/home/docker_user/.ssh:z
      - ${SEAFLOOR_MAPPING_DIR:-/Volumes/SeafloorMapping}:/mbari/SeafloorMapping:z
    command: /usr/sbin/sshd -D

  nginx:
    profiles:
      - full
    image: smdb_production_nginx
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
      args:
        - DOCKER_USER_ID=$DOCKER_USER_ID
    container_name: nginx
    volumes:
      # User with $DOCKER_USER_ID needs read permissions on this share
      - ${SEAFLOOR_MAPPING_DIR:-/Volumes/SeafloorMapping}:/srv/SeafloorMapping:ro
      - local_media_files:/media
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
